name: CI - Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: scanning the code, looking for linting issues.
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Run Clippy (Optional but recommended)
      run: cargo clippy -- -D warnings
    - name: Run Rustfmt (Optional but recommended)
      run: cargo fmt -- --check
